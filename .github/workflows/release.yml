name: Release — Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    name: Build Python wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  test-before-release:
    name: Verify package installs & works
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - uses: actions/download-artifact@v4
        with: { name: python-dist, path: dist/ }

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Integration test
        run: |
          echo "video bytes" > /tmp/ep.mp4
          tslsl create /tmp/ep.mp4 -s "تجربة" --season 1 --episode 1 \
                -o /tmp/ep.tslsl -p "release_test_pw"
          tslsl info  /tmp/ep.tslsl
          tslsl extract /tmp/ep.tslsl -o /tmp/ep_out.mp4 -p "release_test_pw"
          diff /tmp/ep.mp4 /tmp/ep_out.mp4

  publish-pypi:
    name: Publish to PyPI
    needs: test-before-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tasalsul
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: python-dist, path: dist/ }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/download-artifact@v4
        with: { name: python-dist, path: dist/ }

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md 2>/dev/null || echo "")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "تسلسل ${{ github.ref_name }}"
          body: |
            ## 🎉 إصدار ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ### التثبيت
            ```bash
            pip install tasalsul==${{ github.ref_name }}
            ```

            ### الروابط
            - [PyPI](https://pypi.org/project/tasalsul/)
          files: |
            dist/*.whl
            dist/*.tar.gz
            assets/tslsl-icon.svg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
