name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: اختبار على ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Smoke test CLI
        shell: bash
        env:
          PYTHONUTF8: "1"
        run: |
          echo "fake video content" > sample.mp4
          tslsl create sample.mp4 -s "مسلسل تجريبي" --season 1 --episode 1 -p "test-pass" -o sample.tslsl
          tslsl info sample.tslsl
          tslsl extract sample.tslsl -p "test-pass" -o restored.mp4
          python -c "
import pathlib
ok = pathlib.Path('sample.mp4').read_bytes() == pathlib.Path('restored.mp4').read_bytes()
exit(0 if ok else 1)
"
