<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-premium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#140A2B"/>
      <stop offset="50%" style="stop-color:#070312"/>
      <stop offset="100%" style="stop-color:#020005"/>
    </linearGradient>
    
    <linearGradient id="ribbon-core" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9063FA"/>
      <stop offset="40%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>

    <linearGradient id="ribbon-shadows" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B1775"/>
      <stop offset="100%" style="stop-color:#170930"/>
    </linearGradient>
    
    <linearGradient id="cyber-neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="30%" style="stop-color:#F472B6"/>
      <stop offset="70%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    
    <linearGradient id="gold-star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9DB"/>
      <stop offset="35%" style="stop-color:#FFD43B"/>
      <stop offset="100%" style="stop-color:#E67E22"/>
    </linearGradient>
    
    <filter id="luxury-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg-premium)" stroke="#2C1654" stroke-width="1.2"/>

  <path d="M12 44 L6 32 L18 32 Z" fill="url(#ribbon-shadows)"/>
  <path d="M52 44 L58 32 L46 32 Z" fill="url(#ribbon-shadows)"/>

  <rect x="5" y="24" width="54" height="4" rx="2" fill="url(#cyber-neon)" filter="url(#luxury-glow)" opacity="0.85"/>

  <path d="M9 17 L55 17 Q58.5 17 57.5 24.5 L53.5 35.5 Q52.5 38 49 38 L15 38 Q11.5 38 10.5 35.5 L6.5 24.5 Q5.5 17 9 17 Z" 
        fill="url(#ribbon-core)" stroke="#E9D5FF" stroke-width="0.7" stroke-opacity="0.85"/>

  <g filter="url(#luxury-glow)">
    <polygon points="32,23.5 29.3,23.8 31.3,25.8 30.7,28.5 33,27.1 35.3,28.5 34.7,25.8 36.7,23.8 34,23.5 33,20.8" 
             fill="url(#gold-star)"/>
  </g>

  <text x="32.5" y="34.5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="5"
        font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.8" opacity="0.95">TSLSL</text>

  <circle cx="15" cy="27.5" r="0.8" fill="#F472B6" filter="url(#luxury-glow)" opacity="0.8"/>
  <circle cx="49" cy="27.5" r="0.8" fill="#38BDF8" filter="url(#luxury-glow)" opacity="0.8"/>
</svg>
